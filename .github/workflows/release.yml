name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            args: ""
            rustTargets: ""
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTargets: "aarch64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare bundled sidecar runtime
        shell: bash
        run: |
          rm -rf apps/desktop/src-tauri/resources
          mkdir -p apps/desktop/src-tauri/resources/node
          # Assemble a self-contained sidecar: vendors the sibling
          # packages/{memory,safety} runtimes it imports via ../../../../ and
          # installs flat (copy-safe) prod deps. A plain `cp -RL` of the sidecar
          # leaves those workspace imports dangling in the bundle.
          node apps/desktop/scripts/prepare-sidecar.mjs
          NODE_BIN="$(command -v node)"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp "$NODE_BIN" apps/desktop/src-tauri/resources/node/node.exe
          else
            cp "$NODE_BIN" apps/desktop/src-tauri/resources/node/node
            chmod +x apps/desktop/src-tauri/resources/node/node
          fi

      - name: Verify bundled sidecar runtime
        shell: bash
        working-directory: apps/desktop/src-tauri/resources/sidecar
        run: |
          test -f bin/pi-prompt.mjs
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            test -f ../node/node.exe
          else
            test -f ../node/node
          fi
          # Fail here, not at users' runtime, if the bundle can't resolve its
          # full module graph (e.g. a workspace import was left dangling).
          node --input-type=module -e "await import('./src/prompt-runner.mjs'); await import('./extensions/irori-tool-gate/index.mjs'); console.log('sidecar module graph OK')"

      - name: Test desktop backend
        working-directory: apps/desktop/src-tauri
        run: cargo test

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign bundled native binaries
        if: runner.os == 'macOS'
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          RESOURCES_DIR="apps/desktop/src-tauri/resources"
          SIGN_IDENTITY="Developer ID Application: Beiming Liu (MJFP85U8HQ)"
          NODE_ENTITLEMENTS="apps/desktop/src-tauri/node-entitlements.plist"
          NODE_RUNTIME="$RESOURCES_DIR/node/node"

          # tauri-action signs the outer .app but does NOT deep-sign native binaries
          # buried in Resources. The self-contained sidecar bundles many of them
          # (node runtime, esbuild, and .node/.dylib modules such as clipboard,
          # jieba, koffi, sqlite-vec), each of which must carry the hardened runtime
          # or notarization rejects the whole archive. Sign every Mach-O file here.
          #
          # The Node runtime additionally needs JIT/library entitlements: under the
          # hardened runtime V8 traps at startup (SIGTRAP, exit 133) without
          # com.apple.security.cs.allow-jit, so the sidecar would crash silently on
          # every prompt. It is the only file that gets the entitlements plist.
          signed=0
          signed_node=0
          while IFS= read -r -d '' f; do
            if ! file "$f" | grep -q "Mach-O"; then
              continue
            fi
            echo "Signing $f"
            if [[ "$f" -ef "$NODE_RUNTIME" ]]; then
              codesign --force \
                --options runtime \
                --timestamp \
                --entitlements "$NODE_ENTITLEMENTS" \
                --keychain "$KEYCHAIN_PATH" \
                --sign "$SIGN_IDENTITY" \
                "$f"
              codesign --verify --strict --verbose=4 "$f"
              codesign -d --entitlements - "$f" | grep -q "allow-jit" \
                || { echo "::error::node runtime missing JIT entitlement after signing" >&2; exit 1; }
              signed_node=1
            else
              codesign --force \
                --options runtime \
                --timestamp \
                --keychain "$KEYCHAIN_PATH" \
                --sign "$SIGN_IDENTITY" \
                "$f"
              codesign --verify --strict --verbose=4 "$f"
            fi
            signed=$((signed + 1))
          done < <(find "$RESOURCES_DIR" -type f \( -perm -u+x -o -name '*.node' -o -name '*.dylib' \) -print0)

          echo "Signed $signed native binaries"
          if [[ "$signed" -eq 0 ]]; then
            echo "::error::No native binaries were signed; expected at least the node runtime" >&2
            exit 1
          fi
          if [[ "$signed_node" -eq 0 ]]; then
            echo "::error::node runtime was not found/signed at $NODE_RUNTIME" >&2
            exit 1
          fi

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: Irori ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: See the assets below to download and install this version.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Verify packaged macOS signature
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_BUNDLE="apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Irori.app"
          codesign --verify --deep --strict --verbose=4 "$APP_BUNDLE"
          spctl --assess --type execute --verbose=4 "$APP_BUNDLE"

          # The bundled Node must keep its JIT entitlement in the final bundle, or
          # the sidecar crashes at runtime (SIGTRAP). Fail the build if tauri's
          # signing pass stripped it. Also smoke-test that Node can run JS.
          BUNDLED_NODE="$APP_BUNDLE/Contents/Resources/resources/node/node"
          codesign -d --entitlements - "$BUNDLED_NODE" | grep -q "allow-jit" \
            || { echo "::error::bundled node lost its JIT entitlement in the packaged app" >&2; exit 1; }
          "$BUNDLED_NODE" -e "process.exit(2 + 2 === 4 ? 0 : 1)" \
            || { echo "::error::bundled node cannot execute JavaScript (JIT crash)" >&2; exit 1; }
          echo "Bundled node JIT entitlement present and JS execution OK"
